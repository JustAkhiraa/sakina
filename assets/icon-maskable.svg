<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="120%">
      <stop offset="0%" stop-color="#1C1E22"/>
      <stop offset="100%" stop-color="#08090C"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C98A"/>
      <stop offset="100%" stop-color="#C9A96E"/>
    </linearGradient>
  </defs>
  <!-- Fond plein-bord (sans coins arrondis) : l'OS applique son propre masque (cercle, carré arrondi...) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Même croissant + perle que icon.svg, recentré et réduit pour tenir dans la "safe zone" à 80% -->
  <g transform="translate(256,256) scale(0.62) translate(-330,-256)">
    <path d="M 330 116 A 150 150 0 1 0 330 396 A 118 118 0 1 1 330 116 Z" fill="url(#gold)"/>
    <circle cx="330" cy="256" r="34" fill="none" stroke="url(#gold)" stroke-width="10"/>
    <circle cx="330" cy="256" r="12" fill="url(#gold)"/>
  </g>
</svg>
